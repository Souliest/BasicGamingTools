<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gaming Tools</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 480px;
      margin: 80px auto;
      padding: 0 1rem;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    h1 {
      font-size: 1.8rem;
      margin-bottom: 0.25rem;
    }
    p {
      color: #888;
      margin-bottom: 2rem;
    }
    .tools {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    a.tool {
      display: block;
      padding: 1rem 1.25rem;
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      color: #e0e0e0;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
    }
    a.tool:hover {
      background: #0f3460;
      border-color: #e94560;
    }
    a.tool .name {
      font-size: 1.1rem;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Gaming Tools</h1>
  <p>A small collection of handy utilities.</p>
  <div class="tools">
    <a class="tool" href="XpTracker/">
      <div class="name">XP Tracker</div>
    </a>
    <a class="tool" href="LevelGoalTracker/">
      <div class="name">Level Goal Tracker</div>
    </a>
  </div>
</body>
</html>
