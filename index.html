<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gaming Tools</title>
  <link rel="stylesheet" href="common/theme.css">
  <style>
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 520px;
      margin: 0 auto 2rem;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 1.6rem;
      color: var(--accent);
      text-shadow: var(--glow);
      letter-spacing: 0.05em;
    }

    button.theme-toggle {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 1.2rem;
      padding: 4px 10px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    button.theme-toggle:hover {
      border-color: var(--accent);
    }

    p.subtitle {
      max-width: 520px;
      margin: 0 auto 2rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .tools {
      max-width: 520px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    a.tool {
      display: block;
      padding: 1.1rem 1.4rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      text-decoration: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    a.tool:hover {
      border-color: var(--accent);
      box-shadow: var(--glow);
    }

    a.tool .name {
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 4px;
    }

    a.tool .desc {
      font-size: 0.8rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
<header>
  <h1>Gaming Tools</h1>
  <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
</header>

<p class="subtitle">A small collection of handy utilities.</p>

<div class="tools" id="toolList"></div>

<script src="common/tools.js"></script>
<script src="common/theme.js"></script>
<script>
    // Render tool cards from registry
    const list = document.getElementById('toolList');
    TOOLS.forEach(tool => {
        const a = document.createElement('a');
        a.className = 'tool';
        a.href = tool.path;
        a.innerHTML = `
        <div class="name">${tool.name}</div>
        ${tool.description ? `<div class="desc">${tool.description}</div>` : ''}
      `;
        list.appendChild(a);
    });

    initTheme();
</script>

<!-- ============================================================
     DATA MIGRATION BLOCK — remove this entire section after running once on each device
     ============================================================ -->
<div id="migrationBlock" style="margin: 1.5rem auto; max-width: 480px; padding: 0 1rem;">
  <button
      id="migrateBtn"
      onclick="runMigration()"
      style="
      width: 100%;
      padding: 0.55rem 1rem;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: inherit;
      font-size: 0.75rem;
      cursor: pointer;
      border-radius: 4px;
      letter-spacing: 0.04em;
    "
  >migrate legacy data</button>
  <div id="migrateStatus" style="margin-top: 0.5rem; font-size: 0.72rem; text-align: center; color: var(--muted); min-height: 1.2em;"></div>
</div>

<script>
    function runMigration() {
        const MAP = [
            { from: 'xptracker_gains',    to: 'bgt:xp-tracker:gains' },
            { from: 'xptracker_start',    to: 'bgt:xp-tracker:start' },
            { from: 'levelGoalTracker_v1',to: 'bgt:level-goal-tracker:data' },
            { from: 'lgt_selectedGame',   to: 'bgt:level-goal-tracker:selected-game' },
        ];

        let migrated = 0;
        let skipped = 0;

        for (const { from, to } of MAP) {
            const val = localStorage.getItem(from);
            if (val === null) { skipped++; continue; }

            // Safety backup before touching anything
            localStorage.setItem('bgt:migration-backup:' + from, val);

            // Only write to new key if it doesn't already have data
            if (localStorage.getItem(to) === null) {
                localStorage.setItem(to, val);
            }

            localStorage.removeItem(from);
            migrated++;
        }

        const btn = document.getElementById('migrateBtn');
        const status = document.getElementById('migrateStatus');
        btn.disabled = true;
        btn.style.opacity = '0.4';
        btn.style.cursor = 'default';

        if (migrated > 0) {
            status.style.color = '#7fff6b';
            status.textContent = `✓ Migrated ${migrated} key${migrated !== 1 ? 's' : ''}${skipped > 0 ? ` (${skipped} already absent)` : ''}`;
        } else {
            status.textContent = 'Nothing to migrate — all legacy keys absent.';
        }
    }
</script>
<!-- ============================================================
     END MIGRATION BLOCK
     ============================================================ -->

</body>
</html>
